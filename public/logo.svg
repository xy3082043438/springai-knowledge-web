<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- AI 光环渐变 -->
    <linearGradient id="aiRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    
    <!-- 书页渐变 - 调整为更高亮 -->
    <linearGradient id="pageL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,1)"/>
      <stop offset="100%" stop-color="rgba(191,219,254,0.9)"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(147,197,253,0.8)"/>
    </linearGradient>

    <!-- 辉光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 去掉了背景色矩形，让图标透明 -->

  <g filter="url(#glow)">
    <!-- ======== 翻开的书 ======== -->
    <g>
      <!-- 左页 -->
      <path d="M256 215 Q176 205, 78 225 L78 408 Q176 392, 256 400 Z" fill="url(#pageL)"/>
      <!-- 右页 -->
      <path d="M256 215 Q336 205, 434 225 L434 408 Q336 392, 256 400 Z" fill="url(#pageR)"/>
      <!-- 书脊 -->
      <line x1="256" y1="215" x2="256" y2="400" stroke="#3b82f6" stroke-width="4" opacity="0.6"/>
    </g>

    <!-- 文字线条 -->
    <g stroke="#2563eb" stroke-width="6" stroke-linecap="round" opacity="0.3">
      <line x1="120" y1="275" x2="210" y2="268"/>
      <line x1="120" y1="305" x2="200" y2="298"/>
      <line x1="120" y1="335" x2="190" y2="330"/>
    </g>

    <!-- ======== AI 核心 ======== -->
    <!-- 外圈光环 -->
    <circle cx="256" cy="155" r="85" fill="none" stroke="url(#aiRing)" stroke-width="4" opacity="0.8"/>
    <!-- 主圆 -->
    <circle cx="256" cy="155" r="70" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

    <!-- 内部神经节点 -->
    <g fill="white">
      <circle cx="256" cy="135" r="10" opacity="1"/>
      <circle cx="218" cy="155" r="7.5" opacity="0.9"/>
      <circle cx="294" cy="155" r="7.5" opacity="0.9"/>
      <circle cx="256" cy="185" r="7.5" opacity="0.9"/>
    </g>

    <!-- 连接线 -->
    <g stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <line x1="256" y1="135" x2="218" y2="155"/>
      <line x1="256" y1="135" x2="294" y2="155"/>
      <line x1="256" y1="135" x2="256" y2="185"/>
      <line x1="218" y1="155" x2="256" y2="185"/>
      <line x1="294" y1="155" x2="256" y2="185"/>
    </g>
  </g>
</svg>
