<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#1a5fd4"/>
    </linearGradient>
    <linearGradient id="pageL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.96)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.82)"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.76)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.55)"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- 顶部光晕 -->
  <ellipse cx="50" cy="-4" rx="48" ry="30" fill="rgba(255,255,255,0.13)"/>

  <!-- ── 对话气泡（上方） ── -->
  <rect x="14" y="9" width="72" height="46" rx="11" fill="rgba(255,255,255,0.20)"/>
  <!-- 气泡尾巴朝向书脊 -->
  <path d="M42 55 L38 63 L52 55" fill="rgba(255,255,255,0.20)"/>

  <!-- 神经网络节点 -->
  <circle cx="38" cy="28" r="4.2" fill="white" filter="url(#glow)" opacity="0.95"/>
  <circle cx="50" cy="19" r="3.6" fill="white" opacity="0.85"/>
  <circle cx="62" cy="28" r="4.2" fill="white" filter="url(#glow)" opacity="0.95"/>
  <circle cx="43" cy="40" r="3.4" fill="white" opacity="0.80"/>
  <circle cx="57" cy="40" r="3.4" fill="white" opacity="0.80"/>
  <circle cx="50" cy="32" r="2.4" fill="rgba(255,255,255,0.65)"/>

  <!-- 连接线 -->
  <line x1="38" y1="28" x2="50" y2="19" stroke="rgba(255,255,255,0.55)" stroke-width="1.4"/>
  <line x1="50" y1="19" x2="62" y2="28" stroke="rgba(255,255,255,0.55)" stroke-width="1.4"/>
  <line x1="38" y1="28" x2="43" y2="40" stroke="rgba(255,255,255,0.50)" stroke-width="1.4"/>
  <line x1="62" y1="28" x2="57" y2="40" stroke="rgba(255,255,255,0.50)" stroke-width="1.4"/>
  <line x1="43" y1="40" x2="57" y2="40" stroke="rgba(255,255,255,0.40)" stroke-width="1.4"/>
  <line x1="38" y1="28" x2="50" y2="32" stroke="rgba(255,255,255,0.30)" stroke-width="1.1"/>
  <line x1="62" y1="28" x2="50" y2="32" stroke="rgba(255,255,255,0.30)" stroke-width="1.1"/>
  <line x1="50" y1="32" x2="43" y2="40" stroke="rgba(255,255,255,0.28)" stroke-width="1.1"/>
  <line x1="50" y1="32" x2="57" y2="40" stroke="rgba(255,255,255,0.28)" stroke-width="1.1"/>

  <!-- ── 翻开的书（下方） ── -->
  <!-- 左页 -->
  <path d="M50 62 Q34 59 12 65 L12 90 Q34 85 50 88 Z" fill="url(#pageL)"/>
  <!-- 右页 -->
  <path d="M50 62 Q66 59 88 65 L88 90 Q66 85 50 88 Z" fill="url(#pageR)"/>
  <!-- 书脊 -->
  <line x1="50" y1="62" x2="50" y2="88" stroke="rgba(80,130,210,0.35)" stroke-width="1.4"/>

  <!-- 左页文字线条 -->
  <line x1="20" y1="73" x2="42" y2="71.5" stroke="rgba(50,100,200,0.32)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20" y1="79" x2="41" y2="77.8" stroke="rgba(50,100,200,0.32)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20" y1="85" x2="38" y2="84" stroke="rgba(50,100,200,0.32)" stroke-width="1.8" stroke-linecap="round"/>
</svg>
